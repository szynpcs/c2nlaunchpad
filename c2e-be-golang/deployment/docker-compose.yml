
version: '3'

services:
  portal-api:
    build: ../.
    container_name: portal-api
    image: registry.localdev:5002/bobabrewery/portal-api-go:0.0.1-snapshot-e954321
    restart: always
    ports:
    - 8080:8080
    environment:
      - GO_ENV=production  # 设置环境变量
    networks:
      - brewery_net
    depends_on:
      mysql-db:
        condition: service_healthy

  mysql-db:
    container_name: brewery-mysql
    image: library/mysql:5.7.29
    restart: always
    volumes:
      - ./mysql/my.cnf:/etc/my.cnf
      - ./mysql/init:/docker-entrypoint-initdb.d/
      - ./mysql/data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - brewery_net
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: brewery
      MYSQL_LOWER_CASE_TABLE_NAMES: 1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

      
networks:
  brewery_net:

